<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tài Khoản HUNGLEPCSHOP</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <style>
        .acc-grid { display: flex; gap: 20px; }
        .acc-sidebar { width: 250px; background: white; border-radius: 4px; box-shadow: var(--shadow-sm); padding: 20px; align-self: flex-start;}
        .acc-menu { list-style: none; margin-top: 20px;}
        .acc-menu li { padding: 10px; cursor: pointer; font-weight: 500; border-radius: 4px; border-bottom: 1px solid #f9f9f9;}
        .acc-menu li:hover, .acc-menu li.active { background: #eef5ff; color: var(--primary-blue);}
        .acc-content { flex: 1; background: white; border-radius: 4px; box-shadow: var(--shadow-sm); padding: 30px;}
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <header>
        <div class="tier-1"><div class="container tier-1-inner"><div class="tier-1-left"><a href="#"><i class='bx bx-map'></i> Hệ thống Showroom</a></div></div></div>
        <div class="tier-2">
            <div class="container tier-2-inner">
                <div class="logo-box"><a href="index.html" class="logo">HUNGLEPC<span class="text-red">SHOP</span></a></div>
                <div class="search-wrapper"><div class="search-box-2"><input type="text" id="searchInputHD" placeholder="Nhập tên linh kiện..."><button><i class='bx bx-search'></i></button></div></div>
                <div class="header-icons">
                    <div class="h-icon-box" id="authBtn" style="color:#ffc107;"><i class='bx bxs-user-circle'></i><div class="text"><span>Hồ sơ</span><b>Của bạn</b></div></div>
                    <div class="h-icon-box cart-wrap" id="cartOpenBtn"><i class='bx bx-cart'></i><span class="cart-badge" id="cartCount">0</span><div class="text"><span>Giỏ hàng</span><b>Của bạn</b></div></div>
                </div>
            </div>
        </div>
        <div class="tier-3">
            <div class="container tier-3-inner">
                <div class="mega-menu-wrapper"><div class="nav-menu-btn"><i class='bx bx-menu'></i> DANH MỤC SẢN PHẨM</div></div>
                <ul class="top-nav-links"><li><a href="products.html"><i class='bx bxs-hot'></i> XẢ KHO</a></li><li><a href="build-pc.html">XÂY DỰNG PC</a></li></ul>
            </div>
        </div>
    </header>

    <div class="cart-sidebar" id="cartSidebar"><div class="cart-header"><h2>GIỎ HÀNG</h2><button id="cartCloseBtn" class="modal-close"><i class='bx bx-x'></i></button></div><div class="cart-items" id="cartItemsContainer"></div><div class="cart-footer"><div class="cart-total"><span>Tổng cộng:</span><span id="cartTotalPrice">0đ</span></div><button class="btn-primary" id="checkoutBtnMain">Thanh Toán Ngay</button></div></div>

    <main class="main-wrapper container">
        <div class="acc-grid">
            <div class="acc-sidebar">
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px; border-bottom:1px dashed #ccc; padding-bottom:15px;">
                    <div style="width:40px;height:40px; border-radius:50%; background:var(--price-red); color:white; display:flex; align-items:center; justify-content:center; font-weight:700;">U</div>
                    <div id="userNameDisplay" style="font-weight:700; color:var(--primary-blue);">Khách</div>
                </div>
                <ul class="acc-menu">
                    <li class="active" onclick="switchTab('orders')"><i class='bx bx-shopping-bag'></i> Quản lý đơn hàng</li>
                    <li onclick="logout()"><i class='bx bx-log-out'></i> Đăng xuất</li>
                </ul>
            </div>
            
            <div class="acc-content">
                <div id="tab-orders" class="acc-tab active">
                    <h2 style="margin-bottom:20px; font-size:18px; color:var(--primary-blue); font-weight:700;">ĐƠN HÀNG CỦA TÔI</h2>
                    <div id="ordersContainer"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="floating-action-group"><div class="float-btn btn-zalo">Z</div></div>
    <footer><div class="container"><p>&copy; 2026 HUNGLEPCSHOP.</p></div></footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if(!currentUser) {
                alert("Vui lòng đăng nhập để xem hồ sơ!");
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('userNameDisplay').innerText = currentUser.username;

            const ordersCont = document.getElementById('ordersContainer');
            if(orders.length === 0) {
                ordersCont.innerHTML = "<p>Bạn chưa có đơn đặt hàng nào hoặc chưa mua hàng thành công.</p>";
            } else {
                ordersCont.innerHTML = orders.reverse().map(o => `
                    <div style="border: 1px solid #e0e0e0; padding: 20px; border-radius: 4px; margin-bottom: 20px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid #f5f5f5; padding-bottom:10px;">
                            <span style="font-weight:700;">Mã đơn: <span class="text-red">${o.id}</span></span>
                            <span>Trạng thái: <span style="font-weight:700; color:#ff9800;">${o.status}</span></span>
                            <span style="color:var(--text-muted); font-size:12px;"><i class='bx bx-time'></i> ${o.date}</span>
                        </div>
                        <div>
                            ${o.items.map(i => `<div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px; border-bottom:1px dashed #eee; padding-bottom:5px;"><span>${i.name} <b style="color:var(--primary-blue)">x${i.quantity}</b></span> <span>${formatCurrency(i.price * i.quantity)}</span></div>`).join('')}
                        </div>
                        <div style="text-align:right; margin-top:15px;">
                            Tổng thanh toán: <span style="font-size:20px; color:var(--price-red); font-weight:700;">${formatCurrency(o.total)}</span>
                        </div>
                    </div>
                `).join('');
            }
        });

        function switchTab(tab) {
            document.querySelectorAll('.acc-tab').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.acc-menu li').forEach(l => l.classList.remove('active'));
            document.getElementById('tab-' + tab).style.display = 'block';
            event.target.classList.add('active');
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        const searchI = document.getElementById('searchInputHD');
        searchI.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') window.location.href = 'products.html?k=' + searchI.value;
        });
    </script>
</body>
</html>
